<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generate BTWB Poster</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      padding: 0;
      background-color: #f5f5f5;
      color: #333;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    form {
      max-width: 400px;
      margin: 0 auto;
    }

    input[type="date"] {
      padding: 0.5rem;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background-color: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    img {
      margin-top: 2rem;
      max-width: 100%;
      height: auto;
      border: 2px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>Generate WOD Poster</h1>
  <form method="GET" action="/generate">
    <input type="date" name="date" required value="{{ default_date }}">
    <br>
    <button type="submit">Generate Poster</button>
  </form>

  {% if image_url %}
    <img src="{{ image_url }}" alt="WOD Poster" />
  {% endif %}
</body>
</html>
